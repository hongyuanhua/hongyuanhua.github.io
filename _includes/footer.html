      <script type="text/javascript" id="mapmyvisitors"
        src="//mapmyvisitors.com/map.js?d=fJoDxb1mIONGjtEEzwosg7gmZUH-LDDGIX6Yx85t7Zo&cl=ffffff&w=a"></script>
