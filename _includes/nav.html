<header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
  <nav class="flex justify-between items-center h-16 px-6 md:px-12 max-w-7xl mx-auto">
    <a href="/" class="text-xl font-bold tracking-tighter text-blue-800">{{ site.name }}</a>
    <div class="hidden md:flex items-center space-x-8 text-sm font-medium">
      <a class="{% if page.url == '/' %}text-blue-700 border-b-2 border-blue-700 pb-1{% else %}text-slate-600 hover:text-blue-600 transition-colors{% endif %}" href="/">About</a>
      <!--
      <a class="{% if page.url contains '/publications' %}text-blue-700 border-b-2 border-blue-700 pb-1{% else %}text-slate-600 hover:text-blue-600 transition-colors{% endif %}" href="/publications/">Publications</a>
      -->
    </div>
    <div class="flex items-center space-x-2">
      <a href="mailto:{{ site.email }}" class="hover:bg-slate-100 rounded-md p-2 transition-all">
        <span class="material-symbols-outlined text-slate-600">mail</span>
      </a>
      <a href="https://github.com/{{ site.github }}" target="_blank" class="hover:bg-slate-100 rounded-md p-2 transition-all">
        <span class="material-symbols-outlined text-slate-600">code</span>
      </a>
    </div>
  </nav>
</header>
