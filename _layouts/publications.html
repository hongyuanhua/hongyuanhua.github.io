<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Publications | {{ site.name }}</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { primary: { DEFAULT: '#1a56a0', 700: '#1a56a0', 800: '#164885' } },
        fontFamily: { sans: ["Inter", "sans-serif"] },
        borderRadius: { "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; font-size: 1.25rem; }
  body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

{% include nav.html %}

<div class="max-w-7xl mx-auto flex flex-col lg:flex-row pt-16">
  {% include sidebar.html %}

  <main class="flex-1 lg:ml-72 min-h-screen bg-white">
    <div class="max-w-4xl mx-auto px-6 md:px-12 py-12">
      <header class="mb-10">
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Publications</h1>
        <div class="h-1 w-20 rounded-full" style="background-color:#1a56a0"></div>
      </header>
      <div class="space-y-6">
        {% for pub in site.data.publications %}
        {% include pub_card.html pub=pub style="detailed" %}
        {% endfor %}
      </div>
    </div>
    {% include footer.html %}
  </main>
</div>
</body>
</html>
